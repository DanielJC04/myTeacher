<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — myTEACHER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <link rel="stylesheet" href="/css/auth.css"/>
</head>
<body class="auth-body">

  <!-- Navbar mínimo -->
  <header class="navbar">
    <div class="container nav-inner">
      <a href="/index.html" class="logo">my<span>TEACHER</span></a>
      <span class="nav-hint">¿No tienes cuenta? <a href="register.html">Regístrate gratis</a></span>
    </div>
  </header>

  <!-- Contenedor principal -->
  <main class="auth-main">
    <div class="auth-card">

      <!-- Encabezado -->
      <div class="auth-header">
        <h1>Bienvenido de nuevo</h1>
        <p>Ingresa tus datos para continuar</p>
      </div>

      <!-- Mensaje de error global (oculto por defecto) -->
      <div class="alert alert-error" id="loginError" style="display:none">
        <span>⚠</span> Correo o contraseña incorrectos.
      </div>

      <!-- Formulario -->
      <div class="auth-form" id="loginForm">

        <!-- Email -->
        <div class="field-group" id="fieldEmail">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            placeholder="tucorreo@ejemplo.com"
            autocomplete="email"
          />
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- Contraseña -->
        <div class="field-group" id="fieldPassword">
          <div class="label-row">
            <label for="password">Contraseña</label>
            <a href="#" class="forgot-link" id="forgotLink">¿Olvidaste tu contraseña?</a>
          </div>
          <div class="input-icon-wrap">
            <input
              type="password"
              id="password"
              placeholder="Tu contraseña"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
              👁
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <!-- Recordarme -->
        <div class="checkbox-row">
          <input type="checkbox" id="remember"/>
          <label for="remember">Recordarme</label>
        </div>

        <!-- Botón enviar -->
        <button class="btn-primary btn-full" id="loginBtn">Iniciar sesión</button>

        <!-- Divisor -->
        <div class="divider"><span>o continúa con</span></div>

        <!-- Sociales -->
        <div class="social-btns">
          <button class="btn-social" id="googleBtn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="18" height="18"/>
            Google
          </button>
          <button class="btn-social" id="githubBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577v-2.165c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub
          </button>
        </div>

      </div>

      <!-- Pie del card -->
      <p class="auth-footer-text">
        ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
      </p>

    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
